services:
  - type: web
    name: buildconnect-pilot
    env: node
    plan: starter
    buildCommand: ""
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/db.json
    disk:
      name: buildconnect-pilot-data
      mountPath: /var/data
      sizeGB: 1
